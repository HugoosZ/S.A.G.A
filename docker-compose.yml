version: '3.8'

services:
  # ==========================================
  # BUS
  # ==========================================
  saga-bus:
    image: jrgiadach/soabus:latest
    container_name: saga-bus-container
    platform: linux/amd64
    ports:
      - "5001:5000"  # Expose 5000 port of the container on port 5001 of the host
    networks:
      - saga-network
    restart: unless-stopped

  # ==========================================
  # VECTOR DATABASE (ChromaDB)
  # ==========================================
  saga-chromadb:
    image: chromadb/chroma:latest
    container_name: saga-chroma-container
    ports:
      - "8000:8000"  # Expose 8000 default port of the container on port 8000 of the host
    volumes:
      # Index the PDFs on local storage
      - ./data/chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE # Volatile data (Vectors) in persistent storage instead of RAM
      - ANONYMIZED_TELEMETRY=FALSE # Disable Telemetry 
    networks:
      - saga-network
    restart: unless-stopped

  service-docum:
      build:
        context: .                          # root of monorepo have the context
        dockerfile: services/docum/Dockerfile 
      container_name: saga-service-docum
      environment:
        - GOOGLE_API_KEY=${GOOGLE_API_KEY} 
        - BUS_HOST=saga-bus                 # Name of the bus service as defined in this docker-compose (saga-bus)
        - BUS_PORT=5000                     # Native port of the bus inside the docker network
        - CHROMA_HOST=saga-chromadb
        - GRAPH_STORE_TYPE=fuseki
        - FUSEKI_URL=http://saga-fuseki:3030
        - FUSEKI_DATASET=ragent
        - GRAPH_EXTRACT_ON_INGEST=true
      volumes:
        # shared local dir to bring PDFs from the PC to the container
        - ./resources:/app/files
      depends_on:
        - saga-bus
        - saga-chromadb
        - saga-fuseki 
      networks:
        - saga-network
      restart: unless-stopped
  db:
    image: postgres:15
    container_name: saga-db-container
    environment:
      POSTGRES_USER: saga_user
      POSTGRES_PASSWORD: saga_pass
      POSTGRES_DB: saga_db
    ports:
      - "5432:5432"  
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db_data:

  service-ragsv:
      build:
        context: .
        dockerfile: services/ragsv/Dockerfile 
      container_name: saga-service-ragsv
      environment:
        - GOOGLE_API_KEY=${GOOGLE_API_KEY} 
        - BUS_HOST=saga-bus                 
        - BUS_PORT=5000                     
        - CHROMA_HOST=saga-chromadb
        - GRAPH_STORE_TYPE=fuseki
        - FUSEKI_URL=http://saga-fuseki:3030
        - FUSEKI_DATASET=ragent
      depends_on:
        - saga-bus
        - saga-chromadb
        - saga-fuseki 
      networks:
        - saga-network
      restart: unless-stopped

  saga-fuseki:
    image: secoresearch/fuseki:latest
    container_name: saga-fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=saga_admin
    volumes:
      - ./data/fuseki_data:/fuseki-base/databases
    networks:
      - saga-network
    restart: unless-stopped

volumes:
  chroma_data:

networks:
  saga-network:
    driver: bridge